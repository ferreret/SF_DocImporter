[Windream]
; Si no hay unidad de red indicada, busca en la ruta \\Windream\Objects
UnidadRed=
ObjectType=Expediente

[Mutuas]
Path=Z:\AUTORIZACIONES\WINDREAM\Cliente2.0\mutuas.txt

[Updates]
; Para activar la actualización automática al arrancar la app, poner Enabled=true
; y completar UpdateUrl con la carpeta de red donde se publican los paquetes.
; Ejemplo: UpdateUrl=\\SERVIDOR\Updates\GestorExpedientes
Enabled=true
UpdateUrl=Z:\AUTORIZACIONES\WINDREAM\Cliente2.0\GestorExpedientes

[UI]
; Preferencias de interfaz, gestionadas automáticamente por la aplicación.
; Zoom: factor de escala (1.0 = 100%, rango 0.6 - 2.0).
; VisorColapsado: true para arrancar con el visor PDF oculto.
Zoom=1.0
VisorColapsado=false