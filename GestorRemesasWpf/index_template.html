<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Listado de Facturas</title>
    <style>
        /* Estilos CSS */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:hover {
            background-color: #f5f5f5;
        }

        a {
            color: #4CAF50;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>Listado de Facturas Procesadas</h1>
    <table>
        <tr>
            <th>Número de Factura</th>
            <th>Fecha de Factura</th>
            <th>Número de Autorización</th>
            <th>Cobertura</th>
            <th>NIF Mutua</th>
            <th>Nombre del Paciente</th>
            <th>DNI del Paciente</th>
            <th>Importe Factura</th>
            <th>Documentos</th>
        </tr>
        <!-- Aquí irán las filas de la tabla -->
        <tbody>
            {{TABLE_ROWS}}
        </tbody>
        <tfoot>
            <tr>
                <td colspan="7"></td>
                <td>{{IMPORTE_TOTAL}}</td>
                <td></td>
            </tr>
        </tfoot>
    </table>

</body>
</html>
